<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smarticky Notes</title>
    <link rel="icon" type="image/png" href="/static/img/logo.png">
    <link rel="stylesheet" href="/static/css/custom.css">
    <style>
        html,
        body {
            min-height: 100%;
            overflow: auto;
        }

        body {
            background: #f7f3ec;
            color: #171511;
            font-family:
                -apple-system, BlinkMacSystemFont, "PingFang SC", "Source Han Sans SC",
                "Noto Sans CJK SC", "Microsoft YaHei", "Segoe UI", sans-serif;
            letter-spacing: 0;
        }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            background: #f7f3ec;
            padding: 24px;
            box-sizing: border-box;
        }

        .login-card {
            background: #fffdf8;
            border: 1px solid #ddd4c6;
            border-radius: 8px;
            padding: 40px;
            max-width: 430px;
            width: 100%;
            box-shadow: 0 18px 54px rgb(34 30 24 / 14%);
            box-sizing: border-box;
        }

        .login-card .about-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            animation: none;
        }

        .login-card .about-logo img {
            filter: drop-shadow(0 8px 18px rgb(216 90 36 / 18%));
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            color: #171511;
            font-size: 26px;
            font-weight: 650;
            line-height: 1.25;
            margin: 0 0 10px;
        }

        .login-header p {
            color: #8b8277;
            font-size: 14px;
            line-height: 1.5;
            margin: 0;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 7px;
            font-weight: 500;
            color: #3f3a34;
            font-size: 13px;
        }

        .form-group input {
            width: 100%;
            min-height: 44px;
            padding: 0 12px;
            border: 1px solid #ddd4c6;
            border-radius: 7px;
            background: #fffdf8;
            color: #171511;
            font-size: 14px;
            transition:
                border-color 0.18s ease,
                box-shadow 0.18s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #d85a24;
            box-shadow: 0 0 0 3px rgb(216 90 36 / 14%);
        }

        .btn-login {
            width: 100%;
            min-height: 44px;
            margin-top: 4px;
            padding: 0 14px;
            background: #d85a24;
            color: #fff8f2;
            border: none;
            border-radius: 7px;
            font-size: 14px;
            font-weight: 650;
            cursor: pointer;
            transition: background 0.18s ease;
        }

        .btn-login:hover {
            background: #b34319;
        }

        .error-message {
            background: #f9e8e5;
            color: #b93434;
            padding: 11px 12px;
            border-radius: 7px;
            margin-bottom: 20px;
            font-size: 13px;
            line-height: 1.5;
            display: none;
        }

        .language-toggle {
            text-align: center;
            margin-top: 24px;
        }

        .language-toggle button {
            background: none;
            border: none;
            color: #304656;
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
        }

        .language-toggle button:hover {
            color: #d85a24;
        }

        @media (max-width: 520px) {
            .login-container {
                padding: 16px;
            }

            .login-card {
                padding: 30px 22px;
            }

            .login-header h1 {
                font-size: 23px;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="about-logo">
                <img src="/static/img/logo.png" alt="Smarticky Logo">
            </div>
            <div class="login-header">
                <h1 id="login-title">Welcome Back</h1>
                <p id="login-subtitle">Sign in to continue</p>
            </div>

            <div class="error-message" id="error-message"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username" id="label-username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username" autofocus>
                </div>

                <div class="form-group">
                    <label for="password" id="label-password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-login" id="btn-submit">Sign In</button>
            </form>

            <div class="language-toggle">
                <button onclick="toggleLanguage()" id="lang-toggle">中文 / English</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        // Translations
        const i18n = {
            zh: {
                title: '欢迎回来',
                subtitle: '登录以继续',
                username: '用户名',
                password: '密码',
                btn_login: '登录',
                error_invalid_credentials: '用户名或密码错误',
                error_login_failed: '登录失败：'
            },
            en: {
                title: 'Welcome Back',
                subtitle: 'Sign in to continue',
                username: 'Username',
                password: 'Password',
                btn_login: 'Sign In',
                error_invalid_credentials: 'Invalid username or password',
                error_login_failed: 'Login failed: '
            }
        };

        // Get saved language or detect
        let lang = localStorage.getItem('language');
        if (!lang) {
            const browserLang = navigator.language || navigator.userLanguage;
            lang = browserLang.startsWith('zh') ? 'zh' : 'en';
        }

        const t = (key) => i18n[lang][key] || key;

        // Apply translations
        function applyTranslations() {
            document.getElementById('login-title').textContent = t('title');
            document.getElementById('login-subtitle').textContent = t('subtitle');
            document.getElementById('label-username').textContent = t('username');
            document.getElementById('label-password').textContent = t('password');
            document.getElementById('btn-submit').textContent = t('btn_login');
        }

        applyTranslations();

        // Toggle language
        function toggleLanguage() {
            lang = lang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('language', lang);
            applyTranslations();
        }

        // Show error message
        function showError(message) {
            const errorEl = document.getElementById('error-message');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        // Handle form submission
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Save JWT token and user info
                    localStorage.setItem('jwt_token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // Redirect to main app
                    window.location.href = '/';
                } else {
                    if (response.status === 401) {
                        showError(t('error_invalid_credentials'));
                    } else {
                        showError(t('error_login_failed') + (data.error || response.statusText));
                    }
                }
            } catch (error) {
                showError(t('error_login_failed') + error.message);
            }
        });
    </script>
</body>

</html>
