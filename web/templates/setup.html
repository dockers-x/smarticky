<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup - Smarticky Notes</title>
    <link rel="icon" type="image/png" href="/static/img/logo.png">
    <link rel="stylesheet" href="/static/css/custom.css">
    <style>
        html,
        body {
            min-height: 100%;
            overflow: auto;
        }

        body {
            background: #f7f3ec;
            color: #171511;
            font-family:
                -apple-system, BlinkMacSystemFont, "PingFang SC", "Source Han Sans SC",
                "Noto Sans CJK SC", "Microsoft YaHei", "Segoe UI", sans-serif;
            letter-spacing: 0;
        }

        .setup-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            background: #f7f3ec;
            padding: 24px;
            box-sizing: border-box;
        }

        .setup-card {
            background: #fffdf8;
            border: 1px solid #ddd4c6;
            border-radius: 8px;
            padding: 40px;
            max-width: 470px;
            width: 100%;
            box-shadow: 0 18px 54px rgb(34 30 24 / 14%);
            box-sizing: border-box;
        }

        .setup-card .about-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            animation: none;
        }

        .setup-card .about-logo img {
            filter: drop-shadow(0 8px 18px rgb(216 90 36 / 18%));
        }

        .setup-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .setup-header h1 {
            color: #171511;
            font-size: 26px;
            font-weight: 650;
            line-height: 1.25;
            margin: 0 0 10px;
        }

        .setup-header p {
            color: #8b8277;
            font-size: 14px;
            line-height: 1.5;
            margin: 0;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 7px;
            font-weight: 500;
            color: #3f3a34;
            font-size: 13px;
        }

        .form-group input {
            width: 100%;
            min-height: 44px;
            padding: 0 12px;
            border: 1px solid #ddd4c6;
            border-radius: 7px;
            background: #fffdf8;
            color: #171511;
            font-size: 14px;
            transition:
                border-color 0.18s ease,
                box-shadow 0.18s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #d85a24;
            box-shadow: 0 0 0 3px rgb(216 90 36 / 14%);
        }

        .btn-setup {
            width: 100%;
            min-height: 44px;
            margin-top: 4px;
            padding: 0 14px;
            background: #d85a24;
            color: #fff8f2;
            border: none;
            border-radius: 7px;
            font-size: 14px;
            font-weight: 650;
            cursor: pointer;
            transition: background 0.18s ease;
        }

        .btn-setup:hover {
            background: #b34319;
        }

        .error-message {
            background: #f9e8e5;
            color: #b93434;
            padding: 11px 12px;
            border-radius: 7px;
            margin-bottom: 20px;
            font-size: 13px;
            line-height: 1.5;
            display: none;
        }

        .success-message {
            background: #eaf5ee;
            color: #2d776f;
            padding: 11px 12px;
            border-radius: 7px;
            margin-bottom: 20px;
            font-size: 13px;
            line-height: 1.5;
            display: none;
        }

        @media (max-width: 520px) {
            .setup-container {
                padding: 16px;
            }

            .setup-card {
                padding: 30px 22px;
            }

            .setup-header h1 {
                font-size: 23px;
            }
        }
    </style>
</head>

<body>
    <div class="setup-container">
        <div class="setup-card">
            <div class="about-logo">
                <img src="/static/img/logo.png" alt="Smarticky Logo">
            </div>
            <div class="setup-header">
                <h1 id="setup-title">Welcome to Smarticky</h1>
                <p id="setup-subtitle">Create your admin account to get started</p>
            </div>

            <div class="error-message" id="error-message"></div>
            <div class="success-message" id="success-message"></div>

            <form id="setup-form">
                <div class="form-group">
                    <label for="username" id="label-username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="email" id="label-email">Email (Optional)</label>
                    <input type="email" id="email" name="email" autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password" id="label-password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label for="password-confirm" id="label-password-confirm">Confirm Password</label>
                    <input type="password" id="password-confirm" name="password-confirm" required autocomplete="new-password">
                </div>

                <button type="submit" class="btn-setup" id="btn-submit">Create Admin Account</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        // Translations
        const i18n = {
            zh: {
                title: '欢迎使用 Smarticky',
                subtitle: '创建管理员账号开始使用',
                username: '用户名',
                email: '邮箱（可选）',
                password: '密码',
                password_confirm: '确认密码',
                btn_create: '创建管理员账号',
                error_password_mismatch: '两次密码不一致',
                error_password_short: '密码至少需要6个字符',
                success_created: '管理员账号创建成功！正在跳转...',
                error_create_failed: '创建失败：'
            },
            en: {
                title: 'Welcome to Smarticky',
                subtitle: 'Create your admin account to get started',
                username: 'Username',
                email: 'Email (Optional)',
                password: 'Password',
                password_confirm: 'Confirm Password',
                btn_create: 'Create Admin Account',
                error_password_mismatch: 'Passwords do not match',
                error_password_short: 'Password must be at least 6 characters',
                success_created: 'Admin account created successfully! Redirecting...',
                error_create_failed: 'Failed to create: '
            }
        };

        // Detect language
        const browserLang = navigator.language || navigator.userLanguage;
        const lang = browserLang.startsWith('zh') ? 'zh' : 'en';
        const t = (key) => i18n[lang][key] || key;

        // Apply translations
        document.getElementById('setup-title').textContent = t('title');
        document.getElementById('setup-subtitle').textContent = t('subtitle');
        document.getElementById('label-username').textContent = t('username');
        document.getElementById('label-email').textContent = t('email');
        document.getElementById('label-password').textContent = t('password');
        document.getElementById('label-password-confirm').textContent = t('password_confirm');
        document.getElementById('btn-submit').textContent = t('btn_create');

        // Show error message
        function showError(message) {
            const errorEl = document.getElementById('error-message');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            document.getElementById('success-message').style.display = 'none';
        }

        // Show success message
        function showSuccess(message) {
            const successEl = document.getElementById('success-message');
            successEl.textContent = message;
            successEl.style.display = 'block';
            document.getElementById('error-message').style.display = 'none';
        }

        // Handle form submission
        document.getElementById('setup-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password-confirm').value;

            // Validate passwords
            if (password !== passwordConfirm) {
                showError(t('error_password_mismatch'));
                return;
            }

            if (password.length < 6) {
                showError(t('error_password_short'));
                return;
            }

            // Submit to API
            try {
                const response = await fetch(`${API_BASE}/setup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess(t('success_created'));
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    showError(t('error_create_failed') + (data.error || response.statusText));
                }
            } catch (error) {
                showError(t('error_create_failed') + error.message);
            }
        });
    </script>
</body>

</html>
